<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Rhythia Maps List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#09090b',       /* Dark slate background */
                            surface: '#18181b',  /* Card background */
                            panel: '#16161b',    /* Dropdown details panel */
                            border: '#27272a',   /* Subtle structure lines */
                            accent: '#8da4ff',   /* Logo blue matching font */
                            muted: '#a1a1aa'     /* Neutral gray text */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg text-gray-100 antialiased font-sans">

    <header class="sticky top-0 z-50 bg-brand-bg/95 border-b border-brand-border backdrop-blur-md px-10 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="rhythia-steam-removebg-preview.png" alt="Rhythia Logo" class="w-10 h-auto">
            <h1 class="text-xl font-bold uppercase tracking-widest text-white">Impossible Rhythia Maps List</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="admin-action-btn" class="hidden bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-4 py-2 rounded border border-red-500 transition-colors">
                Edit List
            </button>
            <div id="auth-section" class="relative">
                <button id="login-button" class="bg-[#5865F2] hover:bg-[#4752C4] text-white font-semibold text-sm px-5 py-2 rounded transition-colors flex items-center gap-2">
                    Login with Discord
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto px-10 py-10 flex gap-8 justify-center items-start">
        <div id="map-list" class="flex-1 max-w-[1000px] flex flex-col gap-4">
            </div>
        
        <aside class="w-80 shrink-0 sticky top-24">
            <div class="bg-brand-surface border border-brand-border rounded-lg overflow-hidden">
                <div class="text-xs font-bold text-emerald-400 uppercase tracking-wider text-center py-3 bg-black/20 border-b border-brand-border">
                    Online Users
                </div>
                <div class="h-64 overflow-y-auto divide-y divide-brand-border" id="ticker-container">
                    </div>
            </div>
        </aside>
    </main>

    <script>
        // ==========================================
        //         CONFIG VARIATION PARAMETERS
        // ==========================================
        const SUPABASE_URL = 'https://gspsmpaunapxmhtngkiz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_OziaNf0aqM2iZeFqMuMKqQ_Pby5qzbR';
        const CLIENT_ID = '1507124123233681579'; 
        const REDIRECT_URI = 'https://www.impossiblerhythiamaps.com/'; 
        const ADMIN_ID = "697113209051545640";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isEditing = false;
        let mapData = [];
        let openPanels = {}; 

        document.addEventListener("DOMContentLoaded", () => {
            handleOAuthCallback();
            checkUserSession();
            fetchLiveMapData();
            subscribeToLiveUpdates();
            initOnlineTracker();
        });

        document.getElementById('login-button').addEventListener('click', () => {
            const oauthUrl = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = oauthUrl;
        });

        async function fetchLiveMapData() {
            const { data, error } = await supabaseClient
                .from('maps')
                .select('*')
                .order('rank', { ascending: true });

            if (error) {
                console.error("Database connection issue:", error.message);
                loadFallbackTemplates(); 
            } else if (data && data.length > 0) {
                mapData = data;
                renderList();
            } else {
                generateInitialDatabaseEntries();
            }
        }

        function subscribeToLiveUpdates() {
            supabaseClient.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', filter: 'table=eq.maps' }, (payload) => {
                const updatedRow = payload.new;
                const index = mapData.findIndex(m => m.id === updatedRow.id || m.rank === updatedRow.rank);
                if (index !== -1) {
                    mapData[index] = updatedRow;
                    renderList();
                }
            })
            .subscribe();
        }

        function renderList() {
            const container = document.getElementById('map-list');
            container.innerHTML = "";

            mapData.forEach((map, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = "relative bg-brand-surface border border-brand-border rounded-lg overflow-hidden transition-colors hover:bg-neutral-900/40 min-h-[110px] flex flex-col";
                
                const isPanelOpen = openPanels[map.rank] ? 'flex' : 'hidden';

                // Setup the background image styling seamlessly using inline styles for dynamic data
                const bgStyle = map.banner 
                    ? `background-image: url(${map.banner}); background-size: cover; background-position: center; opacity: 0.25;` 
                    : `background-image: radial-gradient(circle at center, #1f2937, transparent 70%); opacity: 0.5;`;

                let videoEmbedUrl = "https://www.youtube.com/embed/";
                if(map.youtubeUrl) {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    const match = map.youtubeUrl.match(regExp);
                    videoEmbedUrl += (match && match[2].length === 11) ? match[2] : "";
                }

                if (!isEditing) {
                    wrapper.innerHTML = `
                        <div class="absolute inset-0 pointer-events-none z-0" style="${bgStyle}"></div>

                        <div class="flex items-center justify-between p-6 cursor-pointer select-none relative z-10 w-full" onclick="togglePanel(${map.rank})">
                            <div class="flex flex-col gap-1">
                                <div class="flex items-center gap-3">
                                    <span class="text-xl font-black text-brand-accent tracking-tight">#${map.rank}</span>
                                    <span class="text-lg font-bold text-white tracking-wide">${map.name}</span>
                                    <span class="text-[10px] font-bold text-brand-accent bg-brand-accent/10 border border-brand-accent/20 px-2 py-0.5 rounded uppercase tracking-wider">.SSPM</span>
                                </div>
                                <div class="text-sm text-brand-muted">by <span class="text-neutral-200 font-medium">${map.creator}</span></div>
                                <div class="mt-2"><span class="text-[11px] font-semibold text-amber-500 bg-amber-500/10 border border-amber-500/20 px-2 py-0.5 rounded uppercase tracking-wider">Map Pattern</span></div>
                            </div>
                            <div class="flex flex-col items-end text-right">
                                <div class="text-lg font-bold text-white">${map.starsCount}</div>
                                <div class="text-sm text-brand-muted font-medium">${map.length}</div>
                                <div class="text-sm font-bold text-emerald-400 mt-1">${map.stars} rp</div>
                                <span class="text-[11px] text-brand-muted uppercase tracking-wider mt-2 font-semibold">${openPanels[map.rank] ? 'Close Details ▲' : 'Open Details ▼'}</span>
                            </div>
                        </div>

                        <div class="${isPanelOpen} border-t border-brand-border bg-brand-panel/90 backdrop-blur-sm p-6 gap-6 relative z-10" id="panel-${map.rank}">
                            <div class="flex-1 max-w-[500px] aspect-video bg-black rounded-md overflow-hidden border border-brand-border">
                                <iframe src="${videoEmbedUrl}" class="w-full h-full border-0" allowfullscreen></iframe>
                            </div>
                            <div class="flex-1 flex flex-col gap-4">
                                <div class="bg-brand-surface border border-brand-border rounded-md p-4 flex flex-col gap-2 text-sm">
                                    <div class="flex justify-between border-b border-brand-border pb-2">
                                        <span class="text-brand-muted">Map Download</span>
                                        <a href="${map.sspmUrl}" class="text-brand-accent hover:underline font-semibold" download>SSPM</a>
                                    </div>
                                    <div class="flex justify-between border-b border-brand-border pb-2">
                                        <span class="text-brand-muted">Creators</span>
                                        <span class="text-white font-semibold">${map.creator}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-brand-border pb-2">
                                        <span class="text-brand-muted">Length</span>
                                        <span class="text-white font-semibold">${map.length}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-brand-border pb-2">
                                        <span class="text-brand-muted">Date Uploaded</span>
                                        <span class="text-white font-semibold">${map.uploadDate || 'N/A'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-brand-muted">Online Link</span>
                                        <a href="${map.onlineLink || '#'}" target="_blank" class="text-brand-accent hover:underline font-semibold">Link</a>
                                    </div>
                                </div>
                                <div class="bg-brand-surface border border-brand-border rounded-md px-4 py-3 flex justify-between items-center text-sm">
                                    <span class="font-bold text-white tracking-wide">Records</span>
                                    <span class="text-xs font-bold text-red-500 bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-full uppercase tracking-wider">Uncleared</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    wrapper.innerHTML = `
                        <div class="absolute inset-0 pointer-events-none z-0" style="${bgStyle}"></div>

                        <div class="p-6 bg-brand-surface/95 backdrop-blur-sm relative z-10 h-full w-full">
                            <div class="flex gap-6 w-full">
                                <div class="flex-1 flex flex-col gap-3">
                                    <div class="text-sm font-bold text-brand-accent mb-1 flex items-center justify-between">
                                        <span>Rank #${map.rank} Core Configuration</span>
                                        <label class="text-xs bg-neutral-800 hover:bg-neutral-700 text-gray-200 px-3 py-1 rounded border border-brand-border cursor-pointer transition-colors">
                                            Upload Background
                                            <input type="file" class="hidden" accept="image/*" onchange="updateItemBanner(event, ${index})">
                                        </label>
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">Map Title</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.name}" onchange="updateItemData(${index}, 'name', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">Creator Name</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.creator}" onchange="updateItemData(${index}, 'creator', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">SSPM Link</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.sspmUrl}" onchange="updateItemData(${index}, 'sspmUrl', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">Upload Date</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.uploadDate || ''}" onchange="updateItemData(${index}, 'uploadDate', this.value)">
                                    </div>
                                </div>
                                <div class="flex-1 flex flex-col gap-3">
                                    <div class="text-sm font-bold text-brand-accent mb-1">Panel Dropdown Settings</div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">YouTube URL</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.youtubeUrl || ''}" onchange="updateItemData(${index}, 'youtubeUrl', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">Online Web Link</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.onlineLink || ''}" onchange="updateItemData(${index}, 'onlineLink', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">Display Stars</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.starsCount}" onchange="updateItemData(${index}, 'starsCount', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">Duration Length</label>
                                        <input type="text" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.length}" onchange="updateItemData(${index}, 'length', this.value)">
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-xs font-bold text-brand-muted uppercase tracking-wider">List RP Points</label>
                                        <input type="number" class="w-full bg-neutral-900 border border-brand-border text-white px-3 py-1.5 rounded text-sm focus:outline-none focus:border-brand-accent" value="${map.stars}" onchange="updateItemData(${index}, 'stars', this.value)">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(wrapper);
            });
        }

        function initOnlineTracker() {
            const ticker = document.getElementById('ticker-container');
            const cachedUser = localStorage.getItem('user_profile');
            
            let username = "Guest_" + Math.floor(Math.random() * 900 + 100);
            let pfpUrl = "https://cdn.discordapp.com/embed/avatars/0.png";

            if (cachedUser) {
                const parsed = JSON.parse(cachedUser);
                username = parsed.username;
                pfpUrl = parsed.avatar ? `https://cdn.discordapp.com/avatars/${parsed.id}/${parsed.avatar}.png` : pfpUrl;
            }
            
            const room = supabaseClient.channel('online-presence-room', {
                config: { presence: { key: username } }
            });

            room.on('presence', { event: 'sync' }, () => {
                const state = room.presenceState();
                ticker.innerHTML = "";
                
                Object.keys(state).forEach(userKey => {
                    const presenceEntries = state[userKey];
                    const avatarMeta = (presenceEntries && presenceEntries[0]) ? presenceEntries[0].avatar_url : "https://cdn.discordapp.com/embed/avatars/0.png";

                    const el = document.createElement('div');
                    el.className = 'flex items-center gap-3 px-4 py-3 text-sm font-semibold text-white';
                    el.innerHTML = `
                        <img src="${avatarMeta}" class="w-7 h-7 rounded-full object-cover border border-brand-border bg-neutral-950" alt="PFP">
                        <span class="truncate">${userKey}</span>
                    `;
                    ticker.appendChild(el);
                });
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await room.track({ online_at: new Date().toISOString(), avatar_url: pfpUrl });
                }
            });
        }

        function togglePanel(rank) {
            openPanels[rank] = !openPanels[rank];
            renderList();
        }

        function updateItemData(index, key, val) {
            mapData[index][key] = val;
            mapData[index].has_mutated = true; 
        }

        function updateItemBanner(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    mapData[index].banner = e.target.result;
                    mapData[index].has_mutated = true;
                    renderList();
                };
                reader.readAsDataURL(file);
            }
        }

        async function toggleEditMode() {
            const btn = document.getElementById('admin-action-btn');
            if (!isEditing) {
                isEditing = true;
                btn.textContent = "Sync Changes Globally";
                btn.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm px-4 py-2 rounded border border-emerald-500 transition-colors";
                renderList();
            } else {
                btn.textContent = "Saving...";
                btn.disabled = true;

                for (let map of mapData) {
                    if (map.has_mutated) {
                        delete map.has_mutated;
                        const { error } = await supabaseClient
                            .from('maps')
                            .upsert(map);
                        if (error) console.error("Database error:", error.message);
                    }
                }

                isEditing = false;
                btn.disabled = false;
                btn.textContent = "Edit List";
                btn.className = "bg-red-600 hover:bg-red-700 text-white font-bold text-sm px-4 py-2 rounded border border-red-500 transition-colors";
                renderList();
            }
        }

        function handleOAuthCallback() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');
            if (accessToken) {
                localStorage.setItem('discord_token', accessToken);
                window.history.replaceState({}, document.title, window.location.pathname);
                fetchDiscordUserData(accessToken);
            }
        }

        async function fetchDiscordUserData(token) {
            try {
                const response = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('user_profile', JSON.stringify(user));
                    renderProfile(user);
                    window.location.reload();
                } else { logout(); }
            } catch (e) { console.error(e); }
        }

        function checkUserSession() {
            const cachedUser = localStorage.getItem('user_profile');
            if (cachedUser) renderProfile(JSON.parse(cachedUser));
        }

        function renderProfile(user) {
            const authSection = document.getElementById('auth-section');
            const avatarUrl = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : `https://cdn.discordapp.com/embed/avatars/0.png`;

            authSection.innerHTML = `
                <div class="flex items-center gap-3 bg-brand-surface border border-brand-border px-4 py-1.5 rounded-full cursor-pointer hover:bg-neutral-800 transition-colors" id="profile-toggle">
                    <img src="${avatarUrl}" class="w-7 h-7 rounded-full object-cover" alt="PFP">
                    <span class="text-sm font-semibold text-white">${user.username}</span>
                </div>
                <div class="hidden absolute top-12 right-0 bg-brand-surface border border-brand-border rounded shadow-xl overflow-hidden w-36" id="dropdown-menu">
                    <button class="w-full text-left px-4 py-2.5 text-sm font-bold text-red-400 hover:bg-neutral-800 transition-colors" id="logout-button">Log Out</button>
                </div>
            `;

            const toggle = document.getElementById('profile-toggle');
            const menu = document.getElementById('dropdown-menu');
            toggle.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('hidden'); });
            document.addEventListener('click', () => menu.classList.add('hidden'));
            document.getElementById('logout-button').addEventListener('click', logout);

            if (user.id === ADMIN_ID) {
                const adminBtn = document.getElementById('admin-action-btn');
                adminBtn.classList.remove('hidden');
                adminBtn.addEventListener('click', toggleEditMode);
            }
        }

        function logout() { localStorage.clear(); window.location.reload(); }

        function loadFallbackTemplates() {
            for (let i = 1; i <= 100; i++) {
                mapData.push({
                    rank: i,
                    name: "Map Placeholder",
                    creator: "crmsn",
                    sspmUrl: "#",
                    stars: (2000.00 - (i * 15)).toFixed(2),
                    banner: "", 
                    starsCount: "10 Stars",
                    length: "58s",
                    youtubeUrl: "https://www.youtube.com/watch?v=4RCWHNyPGeE",
                    uploadDate: "8/23/2026",
                    onlineLink: "#"
                });
            }
            renderList();
        }

        async function generateInitialDatabaseEntries() {
            loadFallbackTemplates();
            for(let map of mapData) {
                await supabaseClient.from('maps').insert(map);
            }
        }
    </script>
</body>
</html>
